name: Duosida Wallbox
slug: duosida_wallbox
description: Local LAN dashboard and control for Duosida EV wallbox chargers.
version: "0.1.0"
url: https://github.com/sarpba/duosida-wallbox-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8765
panel_icon: mdi:ev-station
ports:
  8765/tcp: null
ports_description:
  8765/tcp: Optional direct dashboard port. Ingress works without exposing it.
options:
  charger_host: 192.168.7.140
  poll_interval: 30
  probe_duration: 8
schema:
  charger_host: str
  poll_interval: int(5,300)
  probe_duration: int(3,60)
